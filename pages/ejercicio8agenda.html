    <main class="flex-grow-1 fondo-gradiente2">
      <section>
        <article class="container">
          <h1 class="text-center my-3 text-dark">AGENDA TELEFONICA</h1>
          <div class="bg-gris rounded border p-3 text-black">
          <h3>Nuevo Contacto</h3>

            <form id="agendaForm">
              <div class="mb-3">
                <label class="form-label">Nombre y Apellido</label>
                <input class="form-control" type="text" id="nomyApe" required />
              </div>
              <div class="mb-3">
                <label class="form-label">Telefono</label>
                <input class="form-control" type="tel" id="telefono" required />
              </div>
              <div class="mb-3">
                <label class="form-label">Direccion</label>
                <input class="form-control" type="text" id="direccion" required />
              </div>
              <div class="mb-3">
                <label class="form-label">Correo Electronico</label>
                <input class="form-control" type="email" id="email" required />
              </div>
              <button type="submit" class="btn btn-success w-100 border-black fw-bold">
                Agregar Contacto
              </button>
            </form>
          </div>
          <h3 class="text-black mt-3">Lista de Contactos</h3>
          <div class="table-responsive">
            <table class="table table-hover table-bordered mt-3">
              <thead class="table-dark">
                <tr>
                  <th>Nombre y Apellido</th>
                  <th>Telefono</th>
                  <th>Direccion</th>
                  <th>Email</th>
                </tr>
              </thead>
              <tbody id="tablaContactos"></tbody>
            </table>
          </div>
        </article>
      </section>
